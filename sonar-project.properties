sonar.projectKey=ferme-intelligente
sonar.projectName=Ferme Intelligente

# This file covers the frontend (JS/TS) and the AI service (Python).
# The backend (Java) is analyzed separately via the Maven Sonar plugin —
# see backend/pom.xml and `mvn sonar:sonar` in backend/.
sonar.sources=frontend/src,ai-service
sonar.exclusions=frontend/node_modules/**,frontend/dist/**,**/*.test.jsx,ai-service/tests/**,e2e/**

sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.python.coverage.reportPaths=ai-service/coverage.xml

sonar.sourceEncoding=UTF-8
