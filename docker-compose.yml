version: '3.9'

# ============================================================
#  Ferme Intelligente — Full-Stack Docker Compose
#
#  Services:
#    nginx        → Reverse proxy / single entry point  :80
#    postgres     → Database                            :5432
#    backend      → Spring Boot API                     :8080
#    frontend     → React (Nginx static)                :3000 (internal)
#    ai-service   → FastAPI AI microservice             :8001 (internal)
#    simulator    → IoT data generator  (profile: simulator)
#
#  Access the app at: http://localhost
# ============================================================

services:

  # ── 0. Nginx — Reverse Proxy (single public entry point) ────
  nginx:
    image: nginx:alpine
    container_name: ferme-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
      - ai-service
    ports:
      - "80:80"
      - "443:443"           # ready for SSL — mount certs here
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # place SSL certs here

  # ── 1. Redis Cache ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ferme-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"         # close in production if not needed externally
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── 2. PostgreSQL Database ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ferme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ferme_intelligente
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"         # close this port in production
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ferme_intelligente"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── 2. Spring Boot Backend ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ferme-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ferme_intelligente
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      APP_JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-min-32-chars}
      APP_JWT_EXPIRATION: 86400000
      APP_CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:3000,${FRONTEND_URL:-}
      AI_SERVICE_URL: http://ai-service:8001
      APP_UPLOAD_DIR: /app/uploads
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_HOST: ${MAIL_HOST:-sandbox.smtp.mailtrap.io}
      MAIL_PORT: ${MAIL_PORT:-2525}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@ferme-intelligente.ma}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    ports:
      - "8080:8080"         # published for Arduino/IoT direct access
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ── 3. React Frontend (Nginx static) ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api    # relative — proxied through the Nginx gateway
    container_name: ferme-frontend
    restart: unless-stopped
    expose:
      - "80"                # internal only

  # ── 4. AI Microservice (FastAPI + PyTorch ResNet9) ───────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ferme-ai
    restart: unless-stopped
    expose:
      - "8001"
    volumes:
      - ai_uploads:/app/uploads
      - type: bind
        source: /Users/abdelalime/Downloads/DataSet/New Plant Diseases Dataset(Augmented)/New Plant Diseases Dataset(Augmented)/valid
        target: /dataset
        read_only: true
    environment:
      DATASET_PATH: /dataset
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── 6. Postgres Exporter (metrics for Prometheus) ────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: ferme-postgres-exporter
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ferme_intelligente?sslmode=disable
    expose:
      - "9187"

  # ── 7. Redis Exporter (metrics for Prometheus) ───────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: ferme-redis-exporter
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis://redis:6379
    expose:
      - "9121"

  # ── 8. Prometheus (metrics collection) ───────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ferme-prometheus
    restart: unless-stopped
    depends_on:
      - backend
      - ai-service
      - postgres-exporter
      - redis-exporter
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"        # close in production if not needed externally

  # ── 9. Grafana (dashboards) ───────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: ferme-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"

  # ── 5. IoT Simulator (optional — start with --profile simulator) ─
  arduino-simulator:
    build:
      context: ./arduino-simulator
      dockerfile: Dockerfile
    container_name: ferme-simulator
    restart: "no"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_URL: http://backend:8080/api/iot/data
    profiles:
      - simulator

volumes:
  postgres_data:
  uploads_data:
  ai_uploads:
  ai_models:
  redis_data:
  prometheus_data:
  grafana_data:
