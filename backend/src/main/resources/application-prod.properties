# ── Production overrides (loaded when SPRING_PROFILES_ACTIVE=prod) ──

# Read all sensitive values from environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# No SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT from env
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# CORS from env
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# AI service from env
ai.service.url=${AI_SERVICE_URL:http://ai-service:8001}

# Upload
app.upload.dir=${APP_UPLOAD_DIR:/app/uploads}

# Actuator (for health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── Flyway (prod) ─────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ── Email (prod via SendGrid/SMTP) ───────────────────────────
spring.mail.host=${MAIL_HOST:smtp.sendgrid.net}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:apikey}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.from=${MAIL_FROM:noreply@ferme-intelligente.ma}
app.frontend.url=${FRONTEND_URL:https://ferme-intelligente.ma}

# ── Cache: Redis in production ────────────────────────────────
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ── Swagger: disable in production ───────────────────────────
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
