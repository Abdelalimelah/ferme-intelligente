# ── Production overrides (loaded when SPRING_PROFILES_ACTIVE=prod) ──

# Read all sensitive values from environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# No SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT from env
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# CORS from env
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# AI service from env
ai.service.url=${AI_SERVICE_URL:http://ai-service:8001}

# Upload
app.upload.dir=${APP_UPLOAD_DIR:/app/uploads}

# Actuator (for health checks + Prometheus scraping)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=never
management.metrics.tags.application=ferme-backend

# ── Flyway (prod) ─────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ── Email (Resend HTTP API — no SMTP ports needed) ───────────
resend.api.key=${RESEND_API_KEY:}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
spring.mail.from=${MAIL_FROM:noreply@ferme-intelligente.ma}
app.frontend.url=${FRONTEND_URL:http://localhost}

# ── Cache: Redis in production ────────────────────────────────
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ── Disable mail health check (SMTP is blocked from Docker) ──
management.health.mail.enabled=false

# ── Swagger: disable in production ───────────────────────────
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
