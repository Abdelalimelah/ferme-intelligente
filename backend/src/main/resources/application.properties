server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/ferme_intelligente
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=ferme-intelligente-secret-key-2026-very-long-and-secure
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173

# AI Microservice
ai.service.url=http://localhost:8001

# File upload for drone images
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads/images

# Actuator (for Docker health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# On existing DB (no flyway_schema_history): treat current schema as V1 baseline
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ── JWT refresh token expiry (7 days in ms) ──────────────────
app.jwt.refresh-expiration=604800000

# ── Email (Mailtrap for local dev — change in prod) ──────────
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=your_mailtrap_username
spring.mail.password=your_mailtrap_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=noreply@ferme-intelligente.ma
app.frontend.url=http://localhost:5173

# ── Cache (Caffeine for dev) ──────────────────────────────────
spring.cache.type=caffeine

# ── Redis (disabled by default in dev — enable in prod) ──────
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.cache.type=redis  ← uncomment when Redis is running

# ── Swagger UI ───────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
