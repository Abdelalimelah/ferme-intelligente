name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Backend Tests ─────────────────────────────────────────
  backend:
    name: Backend (Java 17 + Maven)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ferme_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build & test
        working-directory: backend
        run: mvn verify -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ferme_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

  # ── 2. Frontend Build ─────────────────────────────────────────
  frontend:
    name: Frontend (Node 20 + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080/api

  # ── 3. AI Service ─────────────────────────────────────────────
  ai-service:
    name: AI Service (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        working-directory: ai-service
        run: pip install -r requirements.txt
      - name: Test health endpoint
        working-directory: ai-service
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8001 &
          sleep 5
          curl -f http://localhost:8001/health

  # ── 4. Docker Build Check ─────────────────────────────────────
  docker:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, ai-service]
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        run: docker compose build --no-cache
