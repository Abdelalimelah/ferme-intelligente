name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Backend Tests ─────────────────────────────────────────
  backend:
    name: Backend (Java 17 + Maven)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ferme_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build & test
        working-directory: backend
        run: mvn verify -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ferme_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

  # ── 2. Frontend Build ─────────────────────────────────────────
  frontend:
    name: Frontend (Node 20 + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Unit tests
        working-directory: frontend
        run: npm run test
      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080/api

  # ── 3. AI Service ─────────────────────────────────────────────
  ai-service:
    name: AI Service (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        working-directory: ai-service
        run: pip install -r requirements-dev.txt
      - name: Unit tests
        working-directory: ai-service
        run: pytest tests/ -v
      - name: Test health endpoint
        working-directory: ai-service
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8001 &
          sleep 5
          curl -f http://localhost:8001/health

  # ── 4. Docker Build Check ─────────────────────────────────────
  docker:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, ai-service]
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        run: docker compose build --no-cache

  # ── 5. End-to-End Tests (Playwright, full stack via docker compose) ──
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Start the stack
        run: docker compose up -d --build

      - name: Wait for the app to be healthy
        run: |
          for i in $(seq 1 30); do
            curl -fs http://localhost/api/auth/login -X POST \
              -H "Content-Type: application/json" -d '{}' >/dev/null 2>&1 && break
            sleep 2
          done

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test
        env:
          BASE_URL: http://localhost

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Tear down the stack
        if: always()
        run: docker compose down -v

  # ── 6. Performance smoke test (k6) ────────────────────────────
  performance:
    name: Performance (k6 smoke test)
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Start the stack
        run: docker compose up -d --build

      - name: Wait for the app to be healthy
        run: |
          for i in $(seq 1 30); do
            curl -fs http://localhost/api/auth/login -X POST \
              -H "Content-Type: application/json" -d '{}' >/dev/null 2>&1 && break
            sleep 2
          done

      - name: Run k6 smoke test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: performance/smoke-test.js
        env:
          BASE_URL: http://localhost

      - name: Tear down the stack
        if: always()
        run: docker compose down -v

  # ── 7. Security scans ───────────────────────────────────────────
  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true # report, don't block — triage separately

      - name: Trivy filesystem scan (deps + misconfig + secrets)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  # ── 8. SonarQube static analysis ──────────────────────────────
  # Self-hosted SonarQube runs locally via `docker compose --profile sonar up`.
  # This job only runs once SONAR_HOST_URL/SONAR_TOKEN repo secrets point it
  # at a server reachable from GitHub-hosted runners (public host, or
  # SonarCloud later) — it's a no-op until those secrets are set.
  sonar:
    name: SonarQube scan
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ferme_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Sonar config
        id: check
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: echo "configured=${{ env.SONAR_HOST_URL != '' }}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        if: steps.check.outputs.configured == 'true'
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Backend analysis (Java)
        if: steps.check.outputs.configured == 'true'
        working-directory: backend
        run: mvn -B verify sonar:sonar -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ferme_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

      - uses: actions/setup-node@v4
        if: steps.check.outputs.configured == 'true'
        with:
          node-version: '20'

      - name: Frontend + AI service analysis (JS/Python)
        if: steps.check.outputs.configured == 'true'
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
